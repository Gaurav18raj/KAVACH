<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVACH | Fund Transfer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="dashboard.html" class="logo" style="font-size: 1.1rem; gap: 0.25rem;">
                <i data-lucide="arrow-left" class="icon"></i> Back to Dashboard
            </a>
        </header>

        <main style="max-width: 500px; margin: 2rem auto;">
            <div class="card">
                <div class="text-center" style="margin-bottom: 2rem;">
                    <div style="display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; background: #e0e7ff; color: var(--primary); border-radius: 50%; margin-bottom: 1rem;">
                        <i data-lucide="send" style="width: 32px; height: 32px;"></i>
                    </div>
                    <h2>Transfer Funds</h2>
                    <p class="text-muted">Instant transfer via NEFT / UPI</p>
                </div>
                
                <form id="transferForm">
                    <div class="form-group">
                        <label for="payee">Payee Account / UPI ID</label>
                        <input type="text" id="payee" placeholder="merchant@upi" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="amount">Transfer Amount (₹)</label>
                        <input type="number" id="amount" placeholder="5000" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="remarks">Remarks (Optional)</label>
                        <input type="text" id="remarks" placeholder="Dinner split" autocomplete="off">
                    </div>
                    
                    <div style="margin: 2rem 0; border-top: 1px dashed var(--border-color);"></div>

                    <div class="form-group" style="background: #f8fafc; padding: 1rem; border-radius: 8px; border: 1px dashed #cbd5e1; margin-bottom: 2rem;">
                        <label style="color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;">
                            <i data-lucide="flask-conical" style="width: 18px; height: 18px;"></i> Hackathon Demo Scenarios
                        </label>
                        <select id="demoScenario" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; background: white; cursor: pointer;">
                            <option value="normal">Normal Legitimate Transaction</option>
                            <option value="kli_attack">Ledger Attack: Huge amount to unknown Payee</option>
                            <option value="jamtara">Jamtara Attack: High Latency (AnyDesk) Override</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mpin">Secure MPIN</label>
                        <input
                            type="password"
                            id="mpin"
                            maxlength="6"
                            placeholder="••••••"
                            required autocomplete="off">
                    </div>
                    
                    <div id="kavachRiskBanner" class="hidden" style="margin-top:1.5rem; padding:1.25rem; border-radius:8px;"></div>
                    
                    <button type="submit" id="submitBtn" class="btn btn-primary" style="margin-top: 1.5rem;">
                        <i data-lucide="shield-check" class="icon"></i> Secure Transfer
                    </button>
                    <p id="errorMsg" class="error-msg hidden" style="margin-top: 1.5rem;"></p>
                </form>
            </div>
        </main>
    </div>
    
    <script src="js/utils.js"></script>
    <script src="js/kavach-sdk.js"></script>
    <script>
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', () => {
            const user = utils.getUser();
            if(!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('transferForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                utils.hideError('errorMsg');

                const mpin = document.getElementById('mpin').value;
                if (mpin !== "123456") {
                    utils.showError('errorMsg', 'Invalid MPIN');
                    return;
                }

                const btn = document.getElementById('submitBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="loader-2" class="icon" style="animation: spin 1s linear infinite;"></i> Verifying...`;
                lucide.createIcons();
                btn.disabled = true;

                let amount = parseFloat(document.getElementById('amount').value);
                let payee = document.getElementById('payee').value;

                // Handle Demo Scenarios
                const scenario = document.getElementById('demoScenario').value;
                if (scenario === 'kli_attack') {
                    amount = 95000;
                    payee = "fraudster99@upi";
                    window.Kavach.setDemoMode('normal');
                } else if (scenario === 'jamtara') {
                    amount = 55000;
                    window.Kavach.setDemoMode('jamtara');
                } else {
                    window.Kavach.setDemoMode('normal');
                }

                const behavioralPayload = window.Kavach.getPayload(amount);

                try {
                    const response = await fetch(`${API_BASE_URL}/transaction`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${utils.getToken()}`
                        },
                        body: JSON.stringify({
                            username: user.username,
                            payee_upi: payee,
                            amount: amount,
                            behavioral_data: behavioralPayload.behavioral_data,
                            device: behavioralPayload.device
                        })
                    });

                    const data = await response.json();

                    const banner = document.getElementById('kavachRiskBanner');
                    
                    if (!response.ok) {
                        utils.showError('errorMsg', data.detail || "Transaction failed.");
                    } else if (data.access_granted) {
                        banner.style.background = '#d1fae5';
                        banner.style.border = '1px solid #10b981';
                        banner.innerHTML = `<div style="display:flex; gap:0.75rem;"><i data-lucide="check-circle-2" style="color:var(--safe);"></i><div><strong style="color:var(--safe)">Transaction Successful</strong><br><span style="color:var(--safe); font-size:0.9rem;">Transfer of ₹${amount} completed securely. Risk: <span class="metric-value">${data.risk_score.toFixed(2)}</span></span></div></div>`;
                        banner.classList.remove('hidden');
                        lucide.createIcons();
                        
                        // GSAP Entrance Animation
                        gsap.fromTo(banner, 
                            { opacity: 0, y: 20 }, 
                            { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }
                        );

                        setTimeout(() => window.location.href = 'dashboard.html', 2500);
                    } else {
                        banner.style.background = '#fee2e2';
                        banner.style.border = '1px solid #ef4444';
                        banner.innerHTML = `<div style="display:flex; gap:0.75rem;"><i data-lucide="alert-triangle" style="color:var(--danger);"></i><div><strong style="color:var(--danger)">KAVACH INTERVENTION</strong><br><span style="color:var(--danger); font-size:0.9rem;">Transaction Blocked. Risk Score: <span class="metric-value">${data.risk_score.toFixed(2)}</span><br>${data.reasons.map(r => `• ${r}`).join('<br>')}</span></div></div>`;
                        banner.classList.remove('hidden');
                        lucide.createIcons();
                        
                        // GSAP Entrance Animation
                        gsap.fromTo(banner, 
                            { opacity: 0, y: 20, scale: 0.95 }, 
                            { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "back.out(1.7)" }
                        );
                    }
                } catch (error) {
                    console.error("Tx Error:", error);
                    utils.showError('errorMsg', "Server error. Is the backend running?");
                } finally {
                    if (document.getElementById('kavachRiskBanner').classList.contains('hidden') || !document.querySelector('#kavachRiskBanner').innerText.includes('Successful')) {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    }
                }
            });
        });
    </script>
    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
