<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVACH | Send Money</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="dashboard.html" class="logo" style="font-size: 1.2rem;">⬅️ Back to Dashboard</a>
        </header>

        <main style="margin-top: 2rem; max-width: 500px; margin-left: auto; margin-right: auto;">
            <div class="glass-panel">
                <h2 style="color: var(--primary); text-align: center; margin-bottom: 1.5rem;">💸 Send Money</h2>
                
                <form id="transferForm">
                    <div class="form-group">
                        <label for="payee">Payee UPI ID / Account</label>
                        <input type="text" id="payee" placeholder="merchant@upi" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" placeholder="5000" required>
                    </div>
                    <div class="form-group">
                        <label for="remarks">Remarks (Optional)</label>
                        <input type="text" id="remarks" placeholder="Dinner split">
                    </div>
                    <div class="form-group">
                        <label for="mpin">MPIN</label>
                        <input
                            type="password"
                            id="mpin"
                            maxlength="6"
                            placeholder="Enter 6-digit MPIN"
                            required>
                    </div>
                    
                    <div id="kavachRiskBanner" class="hidden" style="margin-top:1rem; padding:1rem; border-radius:8px;"></div>
                    <button type="submit" id="submitBtn" class="btn" style="margin-top: 1rem;">Secure Transfer</button>
                    <p id="errorMsg" class="error hidden" style="margin-top: 1rem;"></p>
                </form>
            </div>
        </main>
    </div>
    
    <script src="js/utils.js"></script>
    <script src="js/kavach-sdk.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = utils.getUser();
            if(!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('transferForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                utils.hideError('errorMsg');

                const mpin = document.getElementById('mpin').value;
                if (mpin !== "123456") {
                    utils.showError('errorMsg', 'Invalid MPIN');
                    return;
                }

                const btn = document.getElementById('submitBtn');
                const originalText = btn.textContent;
                btn.textContent = "Verifying Transaction...";
                btn.disabled = true;

                const amount = parseFloat(document.getElementById('amount').value);
                const payee = document.getElementById('payee').value;

                // Grab behavior just for this form session
                const behavioralPayload = window.Kavach.getPayload(amount);

                try {
                    const response = await fetch(`${API_BASE_URL}/transaction`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${utils.getToken()}`
                        },
                        body: JSON.stringify({
                            username: user.username,
                            payee_upi: payee,
                            amount: amount,
                            behavioral_data: behavioralPayload.behavioral_data,
                            device: behavioralPayload.device
                        })
                    });

                    const data = await response.json();

                    const banner = document.getElementById('kavachRiskBanner');
                    
                    if (!response.ok) {
                        utils.showError('errorMsg', data.detail || "Transaction failed.");
                    } else if (data.access_granted) {
                        banner.style.background = 'rgba(34,197,94,0.15)';
                        banner.style.border = '1px solid #22c55e';
                        banner.innerHTML = `<strong style="color:#22c55e">KAVACH APPROVED</strong><br>
                            Risk Score: ${data.risk_score} | Transfer of Rs.${amount} to ${payee} completed.`;
                        banner.classList.remove('hidden');
                        setTimeout(() => window.location.href = 'dashboard.html', 3000);
                    } else {
                        // Handled based on Action
                        banner.style.background = 'rgba(239,68,68,0.15)';
                        banner.style.border = '1px solid #ef4444';
                        banner.innerHTML = `<strong style="color:#ef4444">KAVACH BLOCKED</strong><br>
                            Risk Score: ${data.risk_score}<br>
                            ${data.reasons.map(r => `• ${r}`).join('<br>')}`;
                        banner.classList.remove('hidden');
                    }
                } catch (error) {
                    console.error("Tx Error:", error);
                    utils.showError('errorMsg', "Server error. Is the backend running?");
                } finally {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
