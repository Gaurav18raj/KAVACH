<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVACH | Account Enrollment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="logo">
                <i data-lucide="shield-check" class="icon-lg"></i>
                KAVACH <span>Banking</span>
            </a>
        </header>

        <main>
            <div class="card auth-container">
                <div class="text-center" style="margin-bottom: 2rem;">
                    <div style="display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; background: #e0e7ff; color: var(--primary); border-radius: 50%; margin-bottom: 1rem;">
                        <i data-lucide="user-plus" style="width: 32px; height: 32px;"></i>
                    </div>
                    <h2>Account Enrollment</h2>
                    <p class="text-muted">Create your KAVACH profile to begin Behavioral DNA generation.</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullName">Full Legal Name</label>
                        <input type="text" id="fullName" name="fullName" placeholder="e.g. Ramesh Kumar" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="username">Desired Customer ID / UPI ID</label>
                        <input type="text" id="username" name="username" placeholder="e.g. ramesh@upi" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="password">Set Secure MPIN</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="off">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="submitBtn" style="margin-top: 1.5rem;">
                        <i data-lucide="file-check-2" class="icon"></i> Complete Enrollment
                    </button>
                    <p id="errorMsg" class="error-msg hidden" style="margin-top: 1.5rem;"></p>
                </form>
                
                <p class="text-center mt-4">
                    Already have an account? <a href="login.html" class="link">Secure Login</a>
                </p>
            </div>
        </main>
    </div>

    <!-- The KAVACH SDK -->
    <script src="js/kavach-sdk.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/register.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
