<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAVACH | Security Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="dashboard.html" class="logo" style="font-size: 1.2rem;">⬅️ Back to Dashboard</a>
        </header>

        <main style="margin-top: 2rem;">
            <h2 style="color: var(--warning); margin-bottom: 1rem;">🛡️ Security Audit & DNA Profile</h2>
            
            <div class="glass-panel" style="margin-bottom: 2rem; border-left: 4px solid var(--primary);">
                <h3>Behavioral DNA Status: <span id="dnaStatus" style="color: var(--primary);">Loading...</span></h3>
                <p>Your typing rhythm and device fingerprints are currently securing this session.</p>
                
                <div style="display: flex; gap: 2rem; margin-top: 1rem;">
                    <div>
                        <small style="color: var(--text-muted); display: block;">Avg Hold Time</small>
                        <strong id="holdMean">...</strong>
                    </div>
                    <div>
                        <small style="color: var(--text-muted); display: block;">Avg Key Interval</small>
                        <strong id="ikiMean">...</strong>
                    </div>
                    <div>
                        <small style="color: var(--text-muted); display: block;">Trusted Devices</small>
                        <strong id="devices">...</strong>
                    </div>
                </div>
            </div>

            <h3>Recent Authentication Logs</h3>
            <div class="glass-panel" style="padding: 0;">
                <ul id="logsList" style="list-style: none; padding: 0; margin: 0;">
                    <li style="padding: 1rem; text-align: center;">Loading logs...</li>
                </ul>
            </div>
        </main>
    </div>
    
    <script src="js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = utils.getUser();
            if(!user) {
                window.location.href = 'login.html';
                return;
            }

            // Fetch DNA
            try {
                const dnaResponse = await fetch(`${API_BASE_URL}/user/dna?username=${encodeURIComponent(user.username)}`, {
                    headers: { 'Authorization': `Bearer ${utils.getToken()}` }
                });
                if (dnaResponse.ok) {
                    const dnaData = await dnaResponse.json();
                    document.getElementById('dnaStatus').textContent = dnaData.status;
                    document.getElementById('holdMean').textContent = `${Math.round(dnaData.hold_mean)} ms`;
                    document.getElementById('ikiMean').textContent = `${Math.round(dnaData.iki_mean)} ms`;
                    document.getElementById('devices').textContent = dnaData.trusted_devices_count;
                }
            } catch (err) {
                console.error("Error fetching DNA", err);
            }

            // Fetch Logs
            try {
                const logsResponse = await fetch(`${API_BASE_URL}/user/logs?username=${encodeURIComponent(user.username)}`, {
                    headers: { 'Authorization': `Bearer ${utils.getToken()}` }
                });
                if (logsResponse.ok) {
                    const logsData = await logsResponse.json();
                    const list = document.getElementById('logsList');
                    list.innerHTML = '';
                    
                    if (logsData.length === 0) {
                        list.innerHTML = '<li style="padding: 1rem;">No logs found.</li>';
                    }

                    logsData.forEach(log => {
                        const li = document.createElement('li');
                        li.style = "padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;";
                        
                        const date = new Date(log.timestamp).toLocaleString();
                        
                        let color = 'var(--success)';
                        if (log.level === 'CHALLENGE') color = 'var(--warning)';
                        if (log.level === 'CRITICAL') color = 'var(--error)';

                        // Truncate reasons if any
                        let reasonHtml = '';
                        if (log.reasons && log.reasons !== '[]') {
                             reasonHtml = `<div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">${log.reasons}</div>`;
                        }

                        li.innerHTML = `
                            <div>
                                <strong>${date}</strong>
                                ${reasonHtml}
                            </div>
                            <span style="color: ${color}; font-weight: bold; text-align: right;">
                                ${log.action}<br>
                                <small style="font-weight: normal; opacity: 0.8;">Risk: ${log.score}</small>
                            </span>
                        `;
                        list.appendChild(li);
                    });
                }
            } catch (err) {
                console.error("Error fetching logs", err);
            }
        });
    </script>
</body>
</html>
